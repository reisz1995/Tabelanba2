name: Atualizar tabela NBA

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  update-nba:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar ambiente Node.js v20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Injeção forçada de dependências
        run: npm install cheerio @supabase/supabase-js dotenv

      - name: Executar rotina de extração e persistência
        run: node scrape.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          
