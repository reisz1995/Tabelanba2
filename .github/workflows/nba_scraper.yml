name: NBA Daily Scraper — Matriz Replicante

on:
  schedule:
    # 09:00 UTC = 06:00 ET = 06:00 BRT-3 — antes dos jogos do dia
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  scrape:
    name: Sequenciador Replicante (Modo D0)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NBA scraper
        env:
          SUPABASE_URL:         ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SCRAPINGANT_API_KEY:  ${{ secrets.SCRAPINGANT_API_KEY }}
        run: python nba_scraper.py

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs
          path: "*.log"
          retention-days: 7
          
