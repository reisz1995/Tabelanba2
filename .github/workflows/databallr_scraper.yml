name: Databallr Scraper - Last 14 Days

on:
  schedule:
    - cron: '0 6 * * *' # 03:00 BRT
  workflow_dispatch:
    inputs:
      period:
        description: 'Período'
        required: true
        default: 'last14'
        type: choice
        options: [last14, last30, full_season]

env:
  PYTHON_VERSION: '3.11'
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  # Mapeamento redundante para segredos
  SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_KEY }}
  DATABALLR_SEASON: '2025-26'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  issues: write

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: 📥 [INIT] Checkout
        uses: actions/checkout@v4

      - name: 🐍 [ENV] Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 [DEPS] Install Core Stack
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests supabase python-dotenv beautifulsoup4 lxml

      - name: 🏀 [OP] Run Next.js Scraper Engine
        id: scraper
        env:
          DATABALLR_PERIOD: ${{ github.event.inputs.period || 'last14' }}
        run: python scraper_databallr.py

      - name: 🧪 [VAL] Data Integrity Validation
        if: success()
        run: |
          cat << 'EOF' > validate.py
          import os, sys
          from supabase import create_client
          from datetime import datetime, timezone, timedelta
          
          url = os.environ.get("SUPABASE_URL")
          key = os.environ.get("SUPABASE_SERVICE_KEY")
          client = create_client(url, key)
          
          # Âncora temporal BRT (UTC-3)
          today = (datetime.now(timezone.utc) - timedelta(hours=3)).date().isoformat()
          
          res = client.table('databallr_team_stats').select('id').eq('record_date', today).execute()
          if len(res.data) == 0:
              print(f"❌ [CRITICAL] Dados não encontrados para {today}"); sys.exit(1)
          print(f"✅ [STABLE] {len(res.data)} registros confirmados.")
          EOF
          python validate.py

      - name: 📂 [DATA] Persist Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telemetria-nba-${{ github.run_id }}
          path: |
            *.json
            *.log
          retention-days: 7

      - name: 🚨 [NOTIFY] Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 FALHA CRÍTICA: Databallr Scraper (${new Date().toISOString()})`,
              body: `Falha na extração de dados NBA. Verificar motor de hidratação Next.js.\nRun ID: #${context.runId}`,
              labels: ['bug', 'data-integrity']
            })
            
