name: Databallr Scraper - Last 14 Days (Hardcoded)

on:
  schedule:
    - cron: '0 6 * * *' # Execução automática: 03:00 BRT
  workflow_dispatch:
    # [SYS-OP] Inputs removidos para garantir integridade do banco (Apenas 14 dias)

env:
  PYTHON_VERSION: '3.11'
  DATABALLR_SEASON: '2025-26'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

permissions:
  contents: read
  issues: write

jobs:
  scrape-and-sync:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_KEY }}
    
    steps:
      - name: 📥 [INIT] Checkout do Repositório
        uses: actions/checkout@v4

      - name: 🐍 [ENV] Setup Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: 📦 [DEPS] Instalação de Dependências Core
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests supabase python-dotenv beautifulsoup4 lxml

      - name: 🏀 [OP] Execução do Motor Scraper (14d)
        id: scraper
        run: python scraper_databallr.py

      - name: 🧪 [VAL] Validação de Densidade de Dados
        if: success()
        run: |
          cat << 'EOF' > validate.py
          import os, sys
          from supabase import create_client
          
          url = os.environ.get("SUPABASE_URL")
          key = os.environ.get("SUPABASE_SERVICE_KEY")
          client = create_client(url, key)
          
          # Constante de auditoria fixa para o novo modelo
          target_period = "last_14_days"
          
          res = client.table('databallr_team_stats').select('id', count='exact').eq('period', target_period).execute()
          
          if res.count == 0:
              print(f"❌ [CRITICAL] Vazio detectado: {target_period} não possui vetores."); sys.exit(1)
          elif res.count < 30:
              print(f"⚠️ [WARN] Fragmentação detectada: {res.count}/30 equipes processadas."); sys.exit(0)
              
          print(f"✅ [STABLE] {res.count} vetores operacionais no quadrante 14d.")
          EOF
          python validate.py

      - name: 📂 [DATA] Persistência de Telemetria
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: telemetria-nba-${{ github.run_id }}
          path: |
            *.json
            *.log
          retention-days: 7

      - name: 🚨 [NOTIFY] Geração de Ticket em Caso de Falha
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 FALHA CRÍTICA: Scraper 14d (${new Date().toISOString()})`,
              body: `Falha na extração ou validação. Run ID: #${context.runId}`,
              labels: ['bug', 'data-integrity']
            })
            
