name: Databallr Scraper - Last 14 Days

on:
  schedule:
    # Executar todos os dias às 6h da manhã UTC (3h da manhã no Brasil)
    - cron: '0 6 * * *'
  
  # Permitir execução manual
  workflow_dispatch:
    inputs:
      period:
        description: 'Período para coleta'
        required: true
        default: 'last14'
        type: choice
        options:
          - last14
          - last30
          - full_season

env:
  PYTHON_VERSION: '3.11'
  SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
  SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
  DATABALLR_SEASON: '2025-26'

jobs:
  scrape-databallr:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas requests supabase-py python-dotenv
      
      - name: Run Databallr Scraper
        id: scraper
        env:
          DATABALLR_PERIOD: ${{ github.event.inputs.period || 'last14' }}
        run: python scraper_databallr.py
      
      - name: Upload logs artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: |
            *.log
            execution_summary.json
          retention-days: 7
      
      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🚨 Falha no Scraper Databallr - ${new Date().toISOString()}`,
              body: `O scraper do Databallr falhou na execução #${{ github.run_id }}. Verifique os logs para mais detalhes.`,
              labels: ['bug', 'data-pipeline', 'automated']
            });

  validate-data:
    needs: scrape-databallr
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Install dependencies
        run: pip install supabase-py pandas
      
      - name: Validate data quality
        run: |
          python -c "
          import os
          from supabase import create_client
          import sys
          
          supabase = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
          
          # Verificar se há dados do dia
          today = __import__('datetime').date.today().isoformat()
          result = supabase.table('databallr_team_stats').select('*').eq('record_date', today).execute()
          
          if len(result.data) == 0:
              print('❌ ERRO: Nenhum dado encontrado para hoje!')
              sys.exit(1)
          
          if len(result.data) < 30:
              print(f'⚠️ AVISO: Apenas {len(result.data)} registros encontrados (esperado: 30)')
          
          print(f'✅ Validação OK: {len(result.data)} times processados')
          "

  generate-report:
    needs: [scrape-databallr, validate-data]
    runs-on: ubuntu-latest
    if: success()
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      
      - name: Generate daily report
        run: |
          python -c "
          import os
          from supabase import create_client
          import json
          from datetime import datetime, timedelta
          
          supabase = create_client(os.environ['SUPABASE_URL'], os.environ['SUPABASE_KEY'])
          
          # Buscar dados dos últimos 14 dias
          fourteen_days_ago = (datetime.now() - timedelta(days=14)).date().isoformat()
          
          result = supabase.table('databallr_team_stats')\\
              .select('*')\\
              .gte('record_date', fourteen_days_ago)\\
              .order('net_rating', desc=True)\\
              .limit(10)\\
              .execute()
          
          top_teams = result.data
          
          report = {
              'generated_at': datetime.now().isoformat(),
              'period': 'last_14_days',
              'top_5_teams': top_teams[:5],
              'total_teams': len(top_teams)
          }
          
          with open('daily_report.json', 'w') as f:
              json.dump(report, f, indent=2, default=str)
          
          print('📊 Relatório gerado com sucesso!')
          print(f'Top 5 times (Net Rating):')
          for i, team in enumerate(top_teams[:5], 1):
              print(f'{i}. {team[\\\"team_name\\\"]}: {team[\\\"net_rating\\\"]:+.1f}')
          "
      
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: daily_report.json
          retention-days: 30
