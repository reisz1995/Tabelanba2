NAME: ATUALIZAÇÃO DIÁRIA DA NBA

ON:
  SCHEDULE:
    # DISPARO ÚNICO ÀS 09:00 BRT (12:00 UTC)
    - CRON: '0 12 * * *'
  WORKFLOW_DISPATCH:

JOBS:
  UPDATE-NBA-DATA:
    RUNS-ON: UBUNTU-LATEST
    TIMEOUT-MINUTES: 15

    STEPS:
      - NAME: 📥 CHECKOUT CODE
        USES: ACTIONS/CHECKOUT@V4

      # --- FASE 1: NODE.JS (ESTADO BASE DA NBA) ---
      - NAME: 🟢 SETUP NODE.JS
        USES: ACTIONS/SETUP-NODE@V4
        WITH:
          NODE-VERSION: '18'
          CACHE: 'NPM'

      - NAME: 📦 INSTALL NODE DEPENDENCIES
        RUN: NPM CI

      - NAME: 🏀 SYNC CORE DATA (SUPABASE)
        ENV:
          SUPABASE_URL: ${{ SECRETS.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ SECRETS.SUPABASE_SERVICE_KEY }}
        RUN: |
          NODE SCRAPE.JS
          NODE IMPORTPLAYERS.JS
      
      # --- FASE 2: PYTHON (ENTROPIA FÍSICA E IA V3.0) ---
      - NAME: 🐍 SETUP PYTHON
        USES: ACTIONS/SETUP-PYTHON@V5
        WITH:
          PYTHON-VERSION: '3.10'
          CACHE: 'PIP'
          
      - NAME: 📦 INSTALL PYTHON DEPENDENCIES
        RUN: PIP INSTALL REQUESTS SUPABASE GROQ PYTZ

      - NAME: 🏥 FETCH INJURIES (NBA_INJURIES.JSON)
        ENV:
          SUPABASE_URL: ${{ SECRETS.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ SECRETS.SUPABASE_SERVICE_KEY }}
        RUN: PYTHON NBA_INJURIES_API.PY

      - NAME: 🔮 GENERATE PREDICTIONS (ESTATÍSTICO CHEFE)
        ENV:
          SUPABASE_URL: ${{ SECRETS.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ SECRETS.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ SECRETS.GROQ_API_KEY }}
        RUN: PYTHON PREDICT_GAMES.PY
