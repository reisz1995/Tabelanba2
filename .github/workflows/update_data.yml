name: ATUALIZAÇÃO DIÁRIA DA NBA (V3.3)

on:
  schedule:
    # DISPARO ÚNICO ÀS 09:00 BRT (12:00 UTC)
    - cron: '0 12 * * *'
  workflow_dispatch:

jobs:
  update-nba-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 CHECKOUT CODE
        uses: actions/checkout@v4

      # --- FASE 1: NODE.JS (CORE DATA) ---
      - name: 🟢 SETUP NODE.JS
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: 📦 INSTALL NODE DEPENDENCIES
        run: npm ci

      - name: 🏀 SYNC CORE DATA
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node scrape.js
          node importPlayers.js
          update-nba-stats.js
      
      # --- FASE 2: PYTHON (ESTATÍSTICO CHEFE) ---
      - name: 🐍 SETUP PYTHON
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: 📦 INSTALL PYTHON DEPENDENCIES
        run: pip install requests supabase groq pytz

      - name: 🏥 FETCH INJURIES
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: python nba_injuries_api.py

      - name: 🔮 GENERATE PREDICTIONS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python predict_games.py

      # --- FASE 3: NOTIFICAÇÃO (TERMINAL ANDROID) ---
      - name: 📱 SEND TELEGRAM NOTIFICATION
        if: always()
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_TO }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          format: markdown
          message: |
            *NBA MONITOR: EXECUÇÃO CONCLUÍDA*
            ---
            *STATUS:* ${{ job.status }}
            *DATA:* ${{ github.event.head_commit.timestamp }}
            *LOG:* [VER EXECUÇÃO](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            
            _PREVISÕES ATUALIZADAS NO SUPABASE (V3.0)_
            
