      - name: 🏀 Sincronizar Core de Dados (Classificação, Jogadores e Mercado)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          # Mapeamento estrito para garantir que o cliente Supabase no arquivo TS inicialize
          VITE_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          node scrape.js
          node importPlayers.js
          npx --yes tsx scrape-nba-odds.ts
          
