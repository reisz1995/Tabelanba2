name: ATUALIZAÇÃO DIÁRIA DA NBA (V3.3)

on:
  schedule:
    # DISPARO ÚNICO ÀS 12:00 BRT (15:00 UTC)
    - cron: '0 15 * * *' # <--- MUTAÇÃO AQUI
  workflow_dispatch:

jobs:
  update-nba-data:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: 📥 CHECKOUT CODE
        uses: actions/checkout@v4

      # --- FASE 1: NODE.JS (CORE DATA & MOMENTUM) ---
      - name: 🟢 SETUP NODE.JS
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 INSTALL NODE DEPENDENCIES
        run: npm ci

      - name: 🏀 SYNC CORE DATA
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # INJEÇÃO DUPLA: Nutre tanto os scripts antigos como os novos
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
        run: |
          node scrape.js
          node importPlayers.js
          node scripts/update-nba-stats.js
      
      # --- FASE 2: PYTHON (ESTATÍSTICO CHEFE & LESÕES) ---
      - name: 🐍 SETUP PYTHON
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: 📦 INSTALL PYTHON DEPENDENCIES
        run: pip install requests supabase groq pytz

      - name: 🏥 FETCH INJURIES
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python nba_injuries_api.py

      - name: 🔮 GENERATE PREDICTIONS
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          # INJEÇÃO DUPLA: Blinda o predict_games.py contra falhas de nomenclatura
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY || secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python predict_games.py

        
